name: Build Windows EXE

on:
  workflow_dispatch:

env:
  CI: true
  NODE_OPTIONS: --max-old-space-size=8192
  HUSKY: 0

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build all workspace packages
        run: |
          pnpm --filter @common/electron-build build
          pnpm --filter @ui-tars/electron-ipc build
          pnpm --filter @ui-tars/shared build
          pnpm --filter @ui-tars/utio build
          pnpm --filter @ui-tars/sdk build
          pnpm --filter @ui-tars/operator-browser build
          pnpm --filter @ui-tars/operator-nut-js build
          pnpm --filter @ui-tars/action-parser build
          pnpm --filter @ui-tars/visualizer build

      - name: Build and package app
        working-directory: apps/ui-tars
        run: |
          pnpm run build:dist
          pnpm run make
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_CACHE: .electron-cache
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: UI-TARS-Windows-x64
          path: apps/ui-tars/out/make/**/*.exe
          if-no-files-found: warn
