name: Build Windows EXE

on:
  workflow_dispatch:

env:
  CI: true
  NODE_OPTIONS: --max-old-space-size=8192
  HUSKY: 0

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies (skip prepare scripts)
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build electron-build package first
        run: pnpm --filter @common/electron-build build

      - name: Remove bytecodePlugin from config
        shell: pwsh
        run: |
          $path = "apps/ui-tars/electron.vite.config.ts"
          $content = Get-Content $path -Raw
          $content = $content -replace "import {[^}]*bytecodePlugin[^}]*} from 'electron-vite'", "import { defineConfig, externalizeDepsPlugin } from 'electron-vite'"
          $content = $content -replace "externalizeDepsPlugin\(\),[\s\n]*bytecodePlugin\(\)", "externalizeDepsPlugin()"
          $content = $content -replace "bytecodePlugin\(\),?[\s\n]*", ""
          Set-Content $path $content
          Write-Output "=== Patched config ==="
          Select-String -Path $path -Pattern "bytecode" -SimpleMatch

      - name: Build ui-tars app
        working-directory: apps/ui-tars
        run: |
          pnpm run build:dist
          pnpm run make
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_CACHE: .electron-cache
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: UI-TARS-Windows-x64
          path: apps/ui-tars/out/make/**/*.exe
          if-no-files-found: warn
