name: Build Windows EXE

on:
  workflow_dispatch:

env:
  CI: true
  NODE_OPTIONS: --max-old-space-size=8192
  HUSKY: 0

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Build all workspace packages (exclude app)
        run: pnpm -r --filter '!ui-tars-desktop' build

      - name: Build app (electron-vite)
        working-directory: apps/ui-tars
        run: pnpm run build:dist
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Copy node_modules and package as portable app
        working-directory: apps/ui-tars
        run: |
          mkdir -p out/portable
          Copy-Item -Recurse dist out/portable/
          Copy-Item -Recurse node_modules out/portable/
          Copy-Item package.json out/portable/
          Copy-Item resources out/portable/ -Recurse -ErrorAction SilentlyContinue
          Remove-Item out/portable/node_modules/.pnpm -Recurse -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path out/portable/* -DestinationPath out/UI-TARS-portable.zip

      - name: Upload ZIP
        uses: actions/upload-artifact@v4
        with:
          name: UI-TARS-Windows-x64
          path: apps/ui-tars/out/UI-TARS-portable.zip
          if-no-files-found: error
