name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - master

env:
  CI: true
  NODE_OPTIONS: --max-old-space-size=8192
  HUSKY: 0

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build dependencies first
        run: pnpm run build:deps

      - name: Build Windows EXE
        working-directory: apps/ui-tars
        run: |
          pnpm run build:dist
          pnpm run make
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
          ELECTRON_CACHE: .electron-cache

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: UI-TARS-Windows-x64
          path: |
            apps/ui-tars/out/make/**/*.exe
            apps/ui-tars/out/make/**/*.msi
          if-no-files-found: warn
