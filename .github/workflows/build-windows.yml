name: Build Windows EXE

on:
  workflow_dispatch:

env:
  CI: true
  NODE_OPTIONS: --max-old-space-size=8192
  HUSKY: 0

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        run: npm install -g pnpm@9
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Build workspace packages
        run: pnpm -r --filter '!ui-tars-desktop' build
      - name: Build and package
        working-directory: apps/ui-tars
        run: |
          pnpm run build:dist
          npx electron-packager . "UI TARS" --platform=win32 --arch=x64 --out=out --overwrite --icon=resources/icon --prune=true
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/
      - name: Create ZIP
        run: |
          cd apps/ui-tars/out
          Compress-Archive -Path "UI TARS-win32-x64/*" -DestinationPath "UI-TARS-win32-x64.zip"
      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v0.3.0-build-${{ github.run_number }}
          name: UI-TARS Desktop v0.3.0 (Windows)
          body: |
            Windows 64-bit build of UI-TARS Desktop v0.3.0
            
            Download the ZIP, extract, and run UI-TARS.exe
          files: apps/ui-tars/out/UI-TARS-win32-x64.zip
          draft: true
